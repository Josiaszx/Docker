version: "3.9"

# services define los contenedores
services:
  api: # contenedor 1
    build: . # construye la imagen desde el Dockerfile
    ports:
      - "8000:8000"
    environment: # variables de entorno
      MONGO_HOST: mongo
      MONGO_PORT: 27017
    depends_on:
      - mongo

  mongo: # contenedor 2
    image: mongo:7 # imagen de la que se construira
    ports:
      - "27017:27017"
    volumes: # persistencia de datos
      - mongo_data:/data/db

volumes:
  mongo_data:
